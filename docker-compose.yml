version: "3.9"

services:
  web:
    build: .
    container_name: aforro_web
    command: gunicorn project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_NAME=aforro
      - DATABASE_USER=aforro_user
      - DATABASE_PASSWORD=aforro_pass
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0

  db:
    image: postgres:15
    container_name: aforro_db
    environment:
      POSTGRES_DB: aforro
      POSTGRES_USER: aforro_user
      POSTGRES_PASSWORD: aforro_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aforro_redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: aforro_celery
    command: celery -A project worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_NAME=aforro
      - DATABASE_USER=aforro_user
      - DATABASE_PASSWORD=aforro_pass
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0

volumes:
  postgres_data:
